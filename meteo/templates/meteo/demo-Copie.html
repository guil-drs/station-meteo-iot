{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Station Météo Demo</title>
	<link rel="stylesheet" type="text/css" href="{% static 'meteo/styles.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Station Météo - Données Simulées</h1>

    <div class="Graphiques">
        <canvas id="GraphiqueTempérature"></canvas>
    </div>
    <div class="Graphiques">
        <canvas id="GraphiqueHumidité"></canvas>
    </div>
    <div class="Graphiques">
        <canvas id="GraphiquePression"></canvas>
    </div>

    <script>
    const mesures = JSON.parse('{{ mesures_json|safe }}');
    const labels = mesures.map(m => m.timestamp);
    const tempData = mesures.map(m => m.temperature);
    const humiditeData = mesures.map(m => m.humidite);
    const pressionData = mesures.map(m => m.pression);

    // Graphique température
    new Chart(document.getElementById('GraphiqueTempérature'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Température (°C)',
                data: tempData,
                borderColor: 'red',
                backgroundColor: 'rgba(255,0,0,0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: { responsive: true }
    });

    // Graphique humidité
    new Chart(document.getElementById('GraphiqueHumidité'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Humidité (%)',
                data: humiditeData,
                borderColor: 'blue',
                backgroundColor: 'rgba(0,0,255,0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: { responsive: true }
    });

    // Graphique pression
    new Chart(document.getElementById('GraphiquePression'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Pression (hPa)',
                data: pressionData,
                borderColor: 'green',
                backgroundColor: 'rgba(0,255,0,0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: { responsive: true }
    });
	</script>
